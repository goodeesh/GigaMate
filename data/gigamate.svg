<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
  </defs>
  <!-- Outer ring (monitoring/control) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#ring-grad)" stroke-width="3" opacity="0.7"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="22" fill="url(#g-grad)" opacity="0.9"/>
  <!-- Stylized "G" letter -->
  <path d="M22 22 h16 a4 4 0 0 1 4 4 v4 h-6 v-2 h-8 v12 h8 v-4 h4 v6 a4 4 0 0 1 -4 4 h-12 a4 4 0 0 1 -4 -4 v-16 a4 4 0 0 1 4 -4 z"
        fill="#ffffff" opacity="0.95"/>
  <!-- Small dots around ring (representing sensors/fans) -->
  <circle cx="32" cy="5" r="2" fill="#43e97b" opacity="0.8"/>
  <circle cx="32" cy="59" r="2" fill="#43e97b" opacity="0.8"/>
  <circle cx="5" cy="32" r="2" fill="#43e97b" opacity="0.8"/>
  <circle cx="59" cy="32" r="2" fill="#43e97b" opacity="0.8"/>
  <!-- Diagonal sensor dots -->
  <circle cx="11" cy="11" r="1.5" fill="#38f9d7" opacity="0.5"/>
  <circle cx="53" cy="11" r="1.5" fill="#38f9d7" opacity="0.5"/>
  <circle cx="11" cy="53" r="1.5" fill="#38f9d7" opacity="0.5"/>
  <circle cx="53" cy="53" r="1.5" fill="#38f9d7" opacity="0.5"/>
</svg>
